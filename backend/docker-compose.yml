services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-billflow}
      POSTGRES_USER: ${POSTGRES_USER:-billflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-billflow} -d ${POSTGRES_DB:-billflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://billflow:billflow@postgres:5432/billflow?schema=public}
      REDIS_URL: ${API_REDIS_URL:-redis://redis:6379}
      STRIPE_SECRET_KEY: ${API_STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${API_STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      BETTER_AUTH_SECRET: ${API_BETTER_AUTH_SECRET:-change-me-to-a-random-32-char-secret}
      BETTER_AUTH_URL: ${API_BETTER_AUTH_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${API_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${API_GOOGLE_CLIENT_SECRET:-}
      PORT: ${API_PORT:-4000}
      NODE_ENV: ${API_NODE_ENV:-development}
      RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_SECONDS: ${API_RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
